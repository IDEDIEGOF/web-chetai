  <!-- Text "highlevel" -->
  <text x="52" y="78" text-anchor="middle" font-family="'Outfit','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700" fill="#37474F" letter-spacing="0.8">highlevel</text>
